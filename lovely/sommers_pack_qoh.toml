[manifest]
version = "1.0.0"
priority = 0

# When William Sommers (any stage) is in your joker row, the first card
# of every Standard pack is forced to be a Queen of Hearts. Parallels
# the Telescope voucher's i==1 force in Celestial packs (card.lua:2007),
# adapted for Sommers' Q♥ obsession.
#
# We inject AFTER the card has been fully created with its edition and
# seal, then change_base it in place to Hearts/Queen if Sommers is in
# play and the card isn't already a Q♥. Edition and seal are preserved.

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = "card:set_seal(SMODS.poll_seal({mod = 10}), true, true)"
position = "after"
match_indent = true
payload = """
-- foole mod: with William Sommers in jokers, the first slot of every
-- Standard pack becomes a Queen of Hearts. Edition + seal preserved.
if i == 1 and G.jokers and G.jokers.cards
   and not (card:get_id() == 12 and card:is_suit("Hearts", true)) then
    for _, _j in pairs(G.jokers.cards) do
        if _j.config and _j.config.center
           and (_j.config.center.key == "j_fool_sommers_infant"
                or _j.config.center.key == "j_fool_sommers_child"
                or _j.config.center.key == "j_fool_sommers") then
            SMODS.change_base(card, "Hearts", "Queen")
            break
        end
    end
end
"""
